name: Naver Rank Tracking

on:
  schedule:
    # 09:00 KST and 15:00 KST.
    - cron: "0 0,6 * * *"
  workflow_dispatch:

jobs:
  refresh-ranks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Refresh due Naver rank trackers
        run: |
          curl --fail --show-error --silent \
            -H "Authorization: Bearer ${{ secrets.MI_RANK_CRON_SECRET }}" \
            "https://insight.momentlabs.co.kr/api/naver-rank-cron?limit=50"
