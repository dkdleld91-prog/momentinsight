name: Naver Place Rank Tracking

on:
  push:
    branches:
      - main
  schedule:
    # KST 09:00/15:00 processing windows. Each serialized job drains up to 20
    # advertisers without running concurrent Chromium collector sessions.
    - cron: "0,5,10,15 0,6 * * *"
    # Post-window catch-up for delayed GitHub schedules or a sleeping collector.
    - cron: "43 1,7 * * *"
    # Hourly catch-up drains delayed or retried trackers even when GitHub starts a slot late.
    - cron: "37 * * * *"
  workflow_dispatch:

concurrency:
  group: naver-place-rank-tracking
  cancel-in-progress: false

permissions: {}

jobs:
  refresh-place-ranks:
    runs-on: ubuntu-latest
    timeout-minutes: 100
    env:
      MI_RANK_CRON_SECRET: ${{ secrets.MI_RANK_CRON_SECRET }}
    steps:
      - name: Validate cron secret
        run: |
          if [ -z "${MI_RANK_CRON_SECRET:-}" ]; then
            echo "::error::GitHub Actions secret MI_RANK_CRON_SECRET is missing. Add the same value used in Vercel Production."
            exit 1
          fi

      - name: Refresh due Naver place rank trackers
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME:-}" = "push" ]; then
            echo "Push-triggered deploy backfill: waiting briefly for production deployment."
            sleep 90
          fi
          node --input-type=module <<'NODE'
          const endpoint = new URL("https://insight.momentlabs.co.kr/api/naver-place-rank-cron");
          const secret = process.env.MI_RANK_CRON_SECRET;
          const batchSize = 1;
          const maxBatches = 20;
          const requestTimeoutMs = 260000;
          const totals = { batches: 0, attempted: 0, succeeded: 0, failed: 0, found: 0, notFound: 0, partial: 0 };

          endpoint.searchParams.set("limit", String(batchSize));
          endpoint.searchParams.set("mode", "drain");

          const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

          function count(value, label) {
            if (typeof value !== "number" || !Number.isInteger(value) || value < 0) {
              throw new Error(`${label} must be a non-negative integer`);
            }
            return value;
          }

          function flag(value, label) {
            if (typeof value !== "boolean") {
              throw new Error(`${label} must be a boolean`);
            }
            return value;
          }

          function payloadMessage(payload) {
            return typeof payload?.message === "string" ? payload.message.slice(0, 240) : "";
          }

          async function callCron() {
            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), requestTimeoutMs);
            let response;
            let body;
            try {
              response = await fetch(endpoint, {
                headers: { authorization: `Bearer ${secret}` },
                signal: controller.signal,
              });
              body = await response.text();
            } catch (error) {
              throw new Error(`place rank cron transport failure: ${error?.message || "unknown_error"}`);
            } finally {
              clearTimeout(timeout);
            }

            if (!response.ok) {
              throw new Error(`place rank cron returned HTTP ${response.status}`);
            }

            let payload;
            try {
              payload = JSON.parse(body);
            } catch {
              throw new Error("place rank cron returned invalid JSON");
            }
            if (!payload || typeof payload !== "object" || Array.isArray(payload)) {
              throw new Error("place rank cron returned an invalid payload");
            }
            if (payload.ok !== true) {
              throw new Error(`place rank cron payload reported failure: ${payloadMessage(payload) || "ok_not_true"}`);
            }
            if (!payload.summary || typeof payload.summary !== "object" || Array.isArray(payload.summary)) {
              throw new Error("place rank cron response is missing summary");
            }

            const summary = payload.summary;
            const safe = {
              status: response.status,
              checked: count(summary.checked, "summary.checked"),
              succeeded: count(summary.succeeded, "summary.succeeded"),
              failed: count(summary.failed, "summary.failed"),
              found: count(summary.found, "summary.found"),
              notFound: count(summary.notFound, "summary.notFound"),
              partial: summary.partial == null ? 0 : count(summary.partial, "summary.partial"),
              remaining: count(summary.remaining, "summary.remaining"),
              drained: flag(summary.drained, "summary.drained"),
              configured: flag(summary.configured, "summary.configured"),
            };
            if (safe.checked !== safe.succeeded + safe.failed) {
              throw new Error("place rank cron summary counts are inconsistent");
            }
            if (safe.found + safe.notFound + safe.partial !== safe.succeeded) {
              throw new Error("place rank cron outcome counts are inconsistent");
            }
            if (!safe.configured) {
              throw new Error("place rank cron provider is not configured");
            }
            if (safe.drained !== (safe.remaining === 0)) {
              throw new Error("place rank cron drained state is inconsistent with remaining count");
            }
            if (safe.checked === 0 && !safe.drained) {
              throw new Error("place rank cron returned zero checked trackers before the queue drained");
            }
            return safe;
          }

          let drained = false;
          for (let batch = 1; batch <= maxBatches; batch += 1) {
            const safe = await callCron();
            totals.batches += 1;
            console.log("Naver place rank cron item " + JSON.stringify({ batch, ...safe }));
            totals.attempted += safe.checked;
            totals.succeeded += safe.succeeded;
            totals.failed += safe.failed;
            totals.found += safe.found;
            totals.notFound += safe.notFound;
            totals.partial += safe.partial;
            if (safe.partial > 0) {
              console.log(`::warning::Naver place rank cron returned ${safe.partial} partial tracker result(s) in batch ${batch}`);
            }
            if (safe.failed > 0) {
              // A single malformed or temporarily unavailable keyword must not
              // strand every healthy tracker behind it. Keep the workflow red,
              // but drain the remaining queue before reporting the failure.
              console.log(`::error::Naver place rank cron returned ${safe.failed} failed tracker(s) in batch ${batch}; continuing the remaining queue`);
            }
            if (safe.drained) {
              drained = true;
              break;
            }
            if (batch < maxBatches) await sleep(2000);
          }

          console.log("Naver place rank cron window " + JSON.stringify({ ...totals, drained }));
          if (!drained) {
            throw new Error(`Naver place rank cron reached the ${maxBatches}-batch safety cap before the queue reported drained`);
          }
          if (totals.failed > 0) {
            throw new Error(`Naver place rank cron drained the queue with ${totals.failed} failed tracker(s)`);
          }
          if (totals.partial > 0) {
            throw new Error(`Naver place rank cron completed with ${totals.partial} partial tracker result(s)`);
          }
          NODE
