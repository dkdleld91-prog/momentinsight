name: Naver Place Rank Tracking

on:
  push:
    branches:
      - main
  schedule:
    # KST 09:00/15:00 processing windows. Four runs can cover 20 advertisers
    # without running concurrent Chromium sessions on the free collector.
    - cron: "0,5,10,15 0,6 * * *"
    # Post-window catch-up for delayed GitHub schedules or a sleeping collector.
    - cron: "43 1,7 * * *"
    # Hourly catch-up drains delayed or retried trackers even when GitHub starts a slot late.
    - cron: "37 * * * *"
  workflow_dispatch:

concurrency:
  group: naver-place-rank-tracking
  cancel-in-progress: false

permissions: {}

jobs:
  refresh-place-ranks:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      MI_RANK_CRON_SECRET: ${{ secrets.MI_RANK_CRON_SECRET }}
    steps:
      - name: Validate cron secret
        run: |
          if [ -z "${MI_RANK_CRON_SECRET:-}" ]; then
            echo "::error::GitHub Actions secret MI_RANK_CRON_SECRET is missing. Add the same value used in Vercel Production."
            exit 1
          fi

      - name: Refresh due Naver place rank trackers
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME:-}" = "push" ]; then
            echo "Push-triggered deploy backfill: waiting briefly for production deployment."
            sleep 90
          fi
          node <<'NODE'
          const endpoint = "https://insight.momentlabs.co.kr/api/naver-place-rank-cron?limit=1";
          const secret = process.env.MI_RANK_CRON_SECRET;
          const maxAttempts = 5;
          const totals = { attempted: 0, succeeded: 0, failed: 0, found: 0, notFound: 0 };

          const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
          async function callCron() {
            return fetch(endpoint, { headers: { authorization: `Bearer ${secret}` } });
          }

          for (let index = 0; index < maxAttempts; index += 1) {
            let response;
            try {
              response = await callCron();
            } catch (error) {
              console.log(`Transport failure on item ${index + 1}; retrying once in 15 seconds.`);
              await sleep(15000);
              response = await callCron();
            }

            const payload = await response.json().catch(() => ({ ok: false, message: "invalid_json_response" }));
            const summary = payload.summary || {};
            const safe = {
              status: response.status,
              ok: Boolean(payload.ok),
              message: payload.message || "",
              checked: Number(summary.checked || 0),
              succeeded: Number(summary.succeeded || 0),
              failed: Number(summary.failed || 0),
              found: Number(summary.found || 0),
              notFound: Number(summary.notFound || 0),
              drained: Boolean(summary.drained),
              configured: Boolean(summary.configured),
            };
            console.log("Naver place rank cron item " + JSON.stringify(safe));

            if (response.status === 401 || response.status === 403) {
              throw new Error("cron authorization failed");
            }
            if (safe.drained || safe.checked === 0) break;

            totals.attempted += safe.checked;
            totals.succeeded += safe.succeeded;
            totals.failed += safe.failed;
            totals.found += safe.found;
            totals.notFound += safe.notFound;
            await sleep(2000);
          }

          console.log("Naver place rank cron window " + JSON.stringify(totals));
          if (totals.failed > 0) process.exitCode = 1;
          NODE
