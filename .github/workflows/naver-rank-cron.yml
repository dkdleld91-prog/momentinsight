name: Naver Rank Tracking

on:
  push:
    branches:
      - main
  schedule:
    # The server only refreshes trackers whose next_check_at is due.
    # Runs every 30 minutes off the top of the hour so missed 09:00/15:00 KST slots are caught up automatically.
    - cron: "7,37 * * * *"
  workflow_dispatch:

concurrency:
  group: naver-rank-tracking
  cancel-in-progress: false

jobs:
  refresh-ranks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      MI_RANK_CRON_SECRET: ${{ secrets.MI_RANK_CRON_SECRET }}
    steps:
      - name: Validate cron secret
        run: |
          if [ -z "${MI_RANK_CRON_SECRET:-}" ]; then
            echo "::error::GitHub Actions secret MI_RANK_CRON_SECRET is missing. Add the same value used in Vercel Production."
            exit 1
          fi

      - name: Refresh due Naver rank trackers
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME:-}" = "push" ]; then
            echo "Push-triggered deploy backfill: waiting briefly for production deployment."
            sleep 90
          fi

          response_file="$(mktemp)"
          trap 'rm -f "$response_file"' EXIT

          call_cron() {
            curl --show-error --silent \
              --output "$response_file" \
              --write-out "%{http_code}" \
              -H "Authorization: Bearer ${MI_RANK_CRON_SECRET}" \
              "https://insight.momentlabs.co.kr/api/naver-rank-cron?limit=50"
          }

          status_code="$(call_cron)"
          if [ "$status_code" -lt 200 ] || [ "$status_code" -ge 300 ]; then
            echo "First cron call returned HTTP ${status_code}. Retrying once after 30 seconds."
            sleep 30
            status_code="$(call_cron)"
          fi

          node - "$response_file" <<'NODE'
          const fs = require("node:fs");
          const file = process.argv[2];
          let payload = {};
          try {
            payload = JSON.parse(fs.readFileSync(file, "utf8") || "{}");
          } catch {
            payload = { ok: false, message: "invalid_json_response" };
          }
          const summary = payload.summary || {};
          const safe = {
            ok: Boolean(payload.ok),
            message: payload.message || "",
            checked: Number(summary.checked || 0),
            succeeded: Number(summary.succeeded || 0),
            failed: Number(summary.failed || 0),
            now: summary.now || "",
          };
          console.log("Naver rank cron summary " + JSON.stringify(safe));
          NODE

          if [ "$status_code" -lt 200 ] || [ "$status_code" -ge 300 ]; then
            echo "::error::Naver rank cron failed with HTTP ${status_code}."
            exit 1
          fi

          echo "Naver rank cron accepted with HTTP ${status_code}."
