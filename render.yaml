services:
  - type: web
    name: moment-place-rank-collector
    runtime: docker
    plan: free
    rootDir: tools/naver-place-rank-collector
    dockerfilePath: Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: NAVER_PLACE_PROVIDER_HEADLESS
        value: "true"
      - key: NAVER_PLACE_PROVIDER_MAX_SCROLLS
        value: "90"
      - key: NAVER_PLACE_PROVIDER_TIMEOUT_MS
        value: "90000"
      - key: PLACE_RANK_COLLECTOR_SECRET
        sync: false
      - key: APIFY_NAVER_MAPS_TOKEN
        sync: false
      - key: APIFY_NAVER_MAPS_ACTOR_ID
        value: searchapi~naver-maps-scraper
      - key: APIFY_NAVER_MAPS_TIMEOUT_MS
        value: "120000"
