services:
  - type: web
    name: moment-place-rank-collector
    runtime: docker
    plan: free
    rootDir: tools/naver-place-rank-collector
    dockerfilePath: Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: NAVER_PLACE_PROVIDER_HEADLESS
        value: "true"
      - key: NAVER_PLACE_PROVIDER_MAX_SCROLLS
        value: "90"
      - key: NAVER_PLACE_PROVIDER_TIMEOUT_MS
        value: "90000"
      - key: PLACE_RANK_COLLECTOR_SECRET
        sync: false
      - key: APIFY_NAVER_MAPS_TOKEN
        sync: false
      - key: APIFY_NAVER_MAPS_IDENTITY_ACTOR_ID
        value: abotapi~naver-map-scraper
      - key: APIFY_NAVER_MAPS_SEARCH_ACTOR_ID
        value: oxygenated_quagmire~naver-place-search
      - key: APIFY_NAVER_MAPS_DEEP_SEARCH_ACTOR_ID
        value: solidcode~naver-map-scraper
      - key: APIFY_NAVER_MAPS_FALLBACK_ACTOR_ID
        value: abotapi~naver-map-scraper
      - key: APIFY_NAVER_MAPS_TIMEOUT_MS
        value: "225000"
      - key: APIFY_NAVER_MAPS_PRIMARY_TIMEOUT_MS
        value: "35000"
      - key: APIFY_NAVER_MAPS_DEEP_TIMEOUT_MS
        value: "170000"
      - key: APIFY_NAVER_MAPS_FALLBACK_TIMEOUT_MS
        value: "40000"
